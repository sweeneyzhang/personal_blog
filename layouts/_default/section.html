{{ define "main" }}
<main class="main single" id="main">
    <div class="main-inner">
        <article class="content post">
            <h1 class="post-title">{{ .Title }}</h1>

            {{ if .Content }}
            <div class="post-content">
                {{ .Content }}
            </div>
            {{ end }}

            {{ $pages := .RegularPages }}
            {{ if $pages }}
                <h2>文章列表</h2>
                <ul class="latest-posts">
                    {{ range $pages }}
                        <li>
                            <span class="post-date">{{ .PublishDate.Format "2006-01-02" }}</span>
                            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                        </li>
                    {{ end }}
                </ul>
            {{ else }}
                <p>暂无文章</p>
            {{ end }}
        </article>
    </div>
</main>
{{ end }}
