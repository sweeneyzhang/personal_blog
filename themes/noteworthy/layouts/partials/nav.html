<!-- Sidebar navigation -->
<nav>
  {{ partial "header.html" . }}
  <div class="nav-menu">
  {{ range .Site.Menus.main }}
    <a class="color-link nav-link" href="{{ .URL }}">{{ .Name }}</a>
  {{ end }}
  {{ with .OutputFormats.Get "RSS" }}
  <a class="color-link nav-link" href="{{ .RelPermalink }}" target="_blank" rel="noopener" type="application/rss+xml">RSS</a>
  {{ end }}
</div>

{{ partial "footer.html" . }}

</nav>
